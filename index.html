<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Golden Valley Production Console</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 42">
            <path d="M13 21a19 19 0 0 1 38 0h-5a14 14 0 0 0-28 0z" />
            <path d="M5 26c14-8 28-8 42 0l-8 5c-10-5-20-5-31 1z" />
            <path d="M15 34c10-5 20-5 31 0l-7 5c-7-3-14-3-22 0z" />
            <path d="M48 26c4-7 9-9 14-10-1 7-5 12-13 14z" />
          </svg>
        </div>
        <div>
          <strong>Golden Valley</strong>
          <span>Production Console</span>
        </div>
      </div>
      <div class="top-actions">
        <label class="file-action">
          <input id="importFile" type="file" accept="application/json">
          <span class="button button-secondary">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 19h16"/></svg>
            Import JSON
          </span>
        </label>
        <button id="downloadManifest" class="button button-secondary" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg>
          Manifest
        </button>
      </div>
    </header>

    <main class="workspace">
      <aside class="input-panel" aria-label="Production data">
        <div class="panel-heading">
          <h1>Production run</h1>
          <p id="runSummary">Готово к генерации.</p>
        </div>

        <form id="productionForm" class="form-grid">
          <section class="form-section">
            <h2>Товар</h2>
            <label>
              <span>Продукт</span>
              <select id="productId"></select>
            </label>
            <label>
              <span>Design template</span>
              <select id="templateId"></select>
            </label>
            <label>
              <span>Сорт / описание</span>
              <input id="variety" type="text">
            </label>
            <div class="two-col">
              <label>
                <span>Grade</span>
                <input id="grade" type="text" value="Premium">
              </label>
              <label>
                <span>Калибр</span>
                <input id="caliber" type="text" value="26-28 mm">
              </label>
            </div>
            <label class="asset-picker">
              <span>Реальное фото товара PNG/JPG</span>
              <input id="productPhoto" type="file" accept="image/png,image/jpeg,image/webp,.png,.jpg,.jpeg,.webp">
              <strong>Upload fruit photo</strong>
            </label>
            <div class="photo-preview">
              <div id="photoPreview" class="photo-thumb"></div>
              <button id="removePhoto" class="small-button" type="button">Remove photo</button>
            </div>
            <div class="two-col">
              <button id="downloadIllustrationSvg" class="small-button" type="button">Illustration SVG</button>
              <button id="downloadIllustrationPng" class="small-button" type="button">Illustration PNG</button>
            </div>
          </section>

          <section class="form-section">
            <h2>Коробка</h2>
            <label>
              <span>Размер коробки</span>
              <select id="boxSize"></select>
            </label>
            <div class="three-col">
              <label>
                <span>Custom W mm</span>
                <input id="customBoxWidth" type="number" min="40" value="400">
              </label>
              <label>
                <span>Custom D mm</span>
                <input id="customBoxDepth" type="number" min="40" value="300">
              </label>
              <label>
                <span>Custom H mm</span>
                <input id="customBoxHeight" type="number" min="20" value="100">
              </label>
            </div>
            <label>
              <span>Формат упаковки</span>
              <select id="packagingType"></select>
            </label>
            <div class="two-col">
              <label>
                <span>Consumer pack</span>
                <input id="consumerPack" type="text" value="Master carton">
              </label>
              <label>
                <span>Units / carton</span>
                <input id="unitsPerCarton" type="number" min="0" value="1">
              </label>
            </div>
            <div class="two-col">
              <label>
                <span>Вес нетто</span>
                <input id="netWeight" type="text">
              </label>
              <label>
                <span>Cartons</span>
                <input id="cartonCount" type="number" min="1" value="1200">
              </label>
            </div>
            <div class="two-col">
              <label>
                <span>Gross / carton kg</span>
                <input id="cartonGrossWeight" type="number" step="0.1" min="0" value="4.6">
              </label>
              <label>
                <span>Package note</span>
                <input id="packageNote" type="text" value="Export pack">
              </label>
            </div>
          </section>

          <section class="form-section">
            <h2>Партия</h2>
            <div class="two-col">
              <label>
                <span>Batch number</span>
                <input id="batch" type="text">
              </label>
              <label>
                <span>Packing date</span>
                <input id="packingDate" type="date">
              </label>
            </div>
            <div class="two-col">
              <label>
                <span>Harvest date</span>
                <input id="harvestDate" type="date">
              </label>
              <label>
                <span>Temperature</span>
                <input id="temperature" type="text">
              </label>
            </div>
          </section>

          <section class="form-section">
            <h2>Экспорт</h2>
            <label>
              <span>Packed by</span>
              <input id="packedBy" type="text" value="UTUMS GROUP LLC">
            </label>
            <label>
              <span>Exporter</span>
              <input id="exporter" type="text" value="UTUMS GROUP LLC">
            </label>
            <label>
              <span>Importer / buyer</span>
              <input id="importer" type="text" value="BFG FIVE STAR FOODSTUFF TRADING LLC">
            </label>
            <div class="two-col">
              <label>
                <span>Origin</span>
                <input id="origin" type="text" value="Uzbekistan">
              </label>
              <label>
                <span>Destination</span>
                <input id="destination" type="text" value="Dubai, UAE">
              </label>
            </div>
            <div class="two-col">
              <label>
                <span>Incoterms</span>
                <input id="incoterms" type="text" value="DAP Dubai, UAE">
              </label>
              <label>
                <span>HS code</span>
                <input id="hsCode" type="text">
              </label>
            </div>
          </section>

          <section class="form-section">
            <h2>Invoice</h2>
            <div class="two-col">
              <label>
                <span>Invoice No.</span>
                <input id="invoiceNo" type="text">
              </label>
              <label>
                <span>Currency</span>
                <input id="currency" type="text" value="USD">
              </label>
            </div>
            <div class="two-col">
              <label>
                <span>Price / kg</span>
                <input id="pricePerKg" type="number" step="0.01" min="0" value="2.40">
              </label>
              <label>
                <span>GS1 prefix</span>
                <input id="gs1Prefix" type="text" value="4781234">
              </label>
            </div>
          </section>

          <section class="form-section">
            <h2>Production files</h2>
            <label class="asset-picker">
              <span>Загрузить .ai / .pdf / .svg / .png</span>
              <input id="assetUpload" type="file" multiple accept=".ai,.pdf,.svg,.png,.jpg,.jpeg,application/pdf,image/svg+xml,image/png,image/jpeg">
              <strong>Attach files</strong>
            </label>
            <div id="assetList" class="asset-list"></div>
          </section>
        </form>
      </aside>

      <section class="output-panel">
        <nav class="tabs" aria-label="Output views">
          <button class="tab active" data-view="packaging" type="button">Packaging</button>
          <button class="tab" data-view="labels" type="button">Labels</button>
          <button class="tab" data-view="3d" type="button">3D</button>
          <button class="tab" data-view="documents" type="button">Docs</button>
          <button class="tab" data-view="catalog" type="button">Catalog</button>
          <button class="tab" data-view="exports" type="button">Exports</button>
          <button class="tab" data-view="data" type="button">Data</button>
        </nav>

        <div class="status-strip">
          <div><span>Box</span><strong id="boxStatus">M</strong></div>
          <div><span>QR</span><strong id="qrStatus">Ready</strong></div>
          <div><span>SSCC</span><strong id="ssccStatus">Ready</strong></div>
          <div><span>Total net</span><strong id="totalNetStatus">0 kg</strong></div>
        </div>

        <section id="view-packaging" class="view active">
          <div class="toolbar">
            <button id="downloadPackagingSvg" class="button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg>
              Full dieline SVG
            </button>
            <button id="downloadPackagingPng" class="button button-secondary" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v14H4zM8 13l3-3 3 4 2-2 3 4"/></svg>
              PNG
            </button>
            <button id="downloadPackagingPdf" class="button button-secondary" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h9l3 3v15H6zM14 3v4h4M9 12h6M9 16h4"/></svg>
              PDF
            </button>
            <button id="downloadPrintPdf" class="button button-secondary" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v14H4zM8 5v14M16 5v14M4 9h16M4 15h16"/></svg>
              Print PDF
            </button>
            <button id="downloadPackagingAi" class="button button-secondary" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h14v16H5zM8 16l3-8 3 8M9 13h4M17 8v8"/></svg>
              AI handoff
            </button>
            <button id="downloadCartonLabel" class="button button-secondary" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4h12v16H6zM9 8h6M9 12h6M9 16h4"/></svg>
              Carton label
            </button>
          </div>
          <div id="packagingPreview" class="preview-frame"></div>
        </section>

        <section id="view-3d" class="view">
          <div class="toolbar">
            <button id="download3dHtml" class="button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 4 7v10l8 4 8-4V7zM4 7l8 4 8-4M12 11v10"/></svg>
              3D HTML
            </button>
            <button id="download3dPng" class="button button-secondary" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v14H4zM8 13l3-3 3 4 2-2 3 4"/></svg>
              3D PNG
            </button>
          </div>
          <div class="view-note">Drag the carton to rotate. Faces use the current generated design.</div>
          <div id="threeDPreview" class="preview-frame three-d-frame"></div>
        </section>

        <section id="view-labels" class="view">
          <div class="toolbar">
            <button id="downloadQrSvg" class="button button-secondary" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM15 15h2v2h-2zM18 18h2v2h-2z"/></svg>
              QR SVG
            </button>
          </div>
          <div id="cartonLabelPreview" class="preview-frame"></div>
        </section>

        <section id="view-documents" class="view">
          <div class="toolbar">
            <button id="addShipmentItem" class="button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
              Add product
            </button>
            <button id="clearShipmentItems" class="button button-secondary" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 7h12M9 7V5h6v2M9 10v8M15 10v8"/></svg>
              Clear list
            </button>
            <button id="downloadPackingList" class="button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h9l3 3v15H6zM14 3v4h4M9 11h6M9 15h6M9 19h4"/></svg>
              Packing List HTML
            </button>
            <button id="downloadInvoice" class="button button-secondary" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h10v18H7zM10 7h4M10 11h4M10 15h4"/></svg>
              Commercial Invoice
            </button>
            <button id="downloadCsv" class="button button-secondary" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h14v16H5zM5 9h14M9 4v16M15 4v16"/></svg>
              CSV
            </button>
          </div>
          <div id="shipmentItemsPreview" class="shipment-items"></div>
          <div id="documentsPreview" class="document-preview"></div>
        </section>

        <section id="view-catalog" class="view">
          <div class="toolbar">
            <button id="downloadProductCard" class="button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v14H4zM7 9h5M7 13h10M7 16h8"/></svg>
              Product card HTML
            </button>
            <button id="downloadMarketplaceJson" class="button button-secondary" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4H5v16h3M16 4h3v16h-3M10 8l4 4-4 4"/></svg>
              Marketplace JSON
            </button>
          </div>
          <div id="catalogPreview" class="catalog-preview"></div>
        </section>

        <section id="view-exports" class="view">
          <div class="toolbar">
            <button id="downloadProductionSvg" class="button" type="button">GoldenValley SVG</button>
            <button id="downloadProductionPng" class="button button-secondary" type="button">GoldenValley PNG</button>
            <button id="downloadProductionPdf" class="button button-secondary" type="button">GoldenValley PDF</button>
            <button id="downloadProductionAi" class="button button-secondary" type="button">GoldenValley AI</button>
            <button id="downloadPrepressPack" class="button button-secondary" type="button">Prepress Pack</button>
          </div>
          <div id="exportsPreview" class="export-grid"></div>
        </section>

        <section id="view-data" class="view">
          <div class="toolbar">
            <button id="copyPayload" class="button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 8h11v13H8zM5 3h11v3M5 3v13h2"/></svg>
              Copy QR payload
            </button>
            <button id="downloadTraceJson" class="button button-secondary" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg>
              Trace JSON
            </button>
          </div>
          <pre id="dataPreview" class="data-preview"></pre>
        </section>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
